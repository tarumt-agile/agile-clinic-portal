{% extends "base.html" %}

{% block title %}Start Consultation - Agile Clinic Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0" id="consultation-heading">Start Consultation</h1>
</div>

<div id="consultation-alert" class="alert alert-danger d-none" role="alert"></div>

<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>Appointments</span>
    <div>
      <label for="consultation-date" class="visually-hidden">Date</label>
      <input type="date" id="consultation-date" class="form-control form-control-sm">
    </div>
  </div>
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead>
        <tr>
          <th scope="col">Time</th>
          <th scope="col">Patient</th>
          <th scope="col">Reason</th>
          <th scope="col">Status</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody id="consultation-table-body">
        <tr><td colspan="5" class="text-center text-muted py-4">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/doctor-start-consultation.js"></script>
{% endblock %}
