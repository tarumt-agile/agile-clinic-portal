name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Type check
        run: |
          pip install mypy types-requests
          mypy src
      - name: Test
        run: |
          pytest --maxfail=1 --disable-warnings -q --cov=src --cov-report=xml --junitxml=junit.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.python-version }}
          path: junit.xml

  summary:
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: junit-3.13
          path: junit-results
        continue-on-error: true
      - name: Write test result counts
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict

          print("## Test Summary")
          print()

          path = "junit-results/junit.xml"
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")

              def classify(testcase):
                  if testcase.find("failure") is not None or testcase.find("error") is not None:
                      return "failed"
                  skipped_el = testcase.find("skipped")
                  if skipped_el is not None:
                      if skipped_el.get("type") == "pytest.xfail":
                          return "xfail"
                      return "skipped"
                  return "passed"

              def new_counts():
                  return {"passed": 0, "failed": 0, "xfail": 0, "skipped": 0}

              testcases = suite.findall("testcase")
              overall = new_counts()
              by_category = defaultdict(new_counts)
              by_file = defaultdict(new_counts)

              for testcase in testcases:
                  outcome = classify(testcase)
                  overall[outcome] += 1

                  # Tests are auto-classified into "acceptance" (BDD/Gherkin
                  # scenarios) or "io" (hits TestClient/a DB session) by
                  # tests/conftest.py, via a "category" property recorded on
                  # each testcase. Anything the conftest didn't classify shows
                  # up as "other" - this stays accurate as new tests are added
                  # without needing to be updated.
                  category = "other"
                  for prop in testcase.findall("./properties/property"):
                      if prop.get("name") == "category":
                          category = prop.get("value")
                  by_category[category][outcome] += 1

                  # junit's classname is a dotted module path (e.g.
                  # "tests.test_patients") - turn it back into a file path.
                  classname = testcase.get("classname", "unknown")
                  file_path = classname.replace(".", "/") + ".py"
                  by_file[file_path][outcome] += 1

              total = len(testcases)
              print("| Result | Count |")
              print("|---|---|")
              print(f"| Passed | {overall['passed']} |")
              print(f"| Failed | {overall['failed']} |")
              print(f"| Known Failing (xfail) | {overall['xfail']} |")
              print(f"| Skipped | {overall['skipped']} |")
              print(f"| **Total** | **{total}** |")
              print()

              labels = {"acceptance": "Acceptance", "io": "I/O", "other": "Other"}
              order = ["acceptance", "io", "other"]

              print("### By test type")
              print()
              print("| Type | Passed | Failed | Known Failing | Skipped | Total |")
              print("|---|---|---|---|---|---|")
              categories = [c for c in order if c in by_category]
              categories += sorted(c for c in by_category if c not in categories)
              for category in categories:
                  counts = by_category[category]
                  cat_total = sum(counts.values())
                  label = labels.get(category, category.title())
                  print(
                      f"| {label} | {counts['passed']} | {counts['failed']} | "
                      f"{counts['xfail']} | {counts['skipped']} | {cat_total} |"
                  )
              print()

              print("### By test file")
              print()
              print("| File | Passed | Failed | Known Failing | Skipped | Total |")
              print("|---|---|---|---|---|---|")
              for file_path in sorted(by_file):
                  counts = by_file[file_path]
                  file_total = sum(counts.values())
                  print(
                      f"| `{file_path}` | {counts['passed']} | {counts['failed']} | "
                      f"{counts['xfail']} | {counts['skipped']} | {file_total} |"
                  )
          else:
              print("_No test results found (the Python 3.13 job may not have completed)._")
          print()
          PY
      - name: List files changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git show --name-only --pretty=format: "$HEAD" | sed '/^$/d')
          else
            FILES=$(git diff --name-only "$BASE" "$HEAD")
          fi
          COUNT=$(echo "$FILES" | grep -c .)

          {
            echo "<details>"
            echo "<summary>Files changed (${COUNT})</summary>"
            echo ""
            echo '```'
            echo "$FILES"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
