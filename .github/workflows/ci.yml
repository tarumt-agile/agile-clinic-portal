name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Type check
        run: |
          pip install mypy types-requests
          mypy src
      - name: Test
        run: |
          pytest --maxfail=1 --disable-warnings -q --cov=src --cov-report=xml --junitxml=junit.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.python-version }}
          path: junit.xml

  summary:
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: junit-3.13
          path: junit-results
        continue-on-error: true
      - name: Write test result counts
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import os
          import xml.etree.ElementTree as ET

          print("## Test Summary")
          print()

          path = "junit-results/junit.xml"
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")

              total = int(suite.get("tests", 0))
              failures = int(suite.get("failures", 0))
              errors = int(suite.get("errors", 0))
              skipped = int(suite.get("skipped", 0))
              passed = total - failures - errors - skipped

              print("| Result | Count |")
              print("|---|---|")
              print(f"| Passed | {passed} |")
              print(f"| Failed | {failures + errors} |")
              print(f"| Skipped | {skipped} |")
              print(f"| **Total** | **{total}** |")
          else:
              print("_No test results found (the Python 3.13 job may not have completed)._")
          print()
          PY
      - name: List files changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git show --name-only --pretty=format: "$HEAD" | sed '/^$/d')
          else
            FILES=$(git diff --name-only "$BASE" "$HEAD")
          fi
          COUNT=$(echo "$FILES" | grep -c .)

          {
            echo "<details>"
            echo "<summary>Files changed (${COUNT})</summary>"
            echo ""
            echo '```'
            echo "$FILES"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
